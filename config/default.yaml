app:
  name: bot-v7
  mode: SHADOW

storage:
  engine: sqlite
  sqlite_path: state/bot-v7.sqlite
  mariadb_url: null

runtime:
  enable_testnet: false
  enable_live: false
  redis_url: redis://127.0.0.1:6379/0

signals:
  default_timeframes: [1m, 5m, 15m, 30m, 1h]
  top_symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT, DOGEUSDT, AVAXUSDT, LINKUSDT, MATICUSDT]
